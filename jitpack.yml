jdk:
  - openjdk17

before_install:
  - sdk install java 17.0.2-open
  - sdk use java 17.0.2-open
  - apt-get update && apt-get install -y golang cmake
  - git submodule update --init --recursive
  - yes | sdkmanager --licenses || true
  - sdkmanager "ndk;29.0.14206865" "cmake;3.22.1"

env:
  JITPACK: "true"

install:
  - ./gradlew :ttsignal:publishToMavenLocal :livekit-android-sdk:publishToMavenLocal :livekit-android-camerax:publishToMavenLocal :livekit-android-track-processors:publishToMavenLocal -xtest -xlint
